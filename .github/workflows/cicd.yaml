name: Android CI/CD Workflow

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  setup-env:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Decode LaundryHub.jks
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
        run: printf '%s' "$KEYSTORE_FILE" | base64 --decode > ./app/laundry_hub_key.jks

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > ./app/google-services.json

      # Step 3: Create config.properties
      - name: Create config.properties
        env:
          WEB_CLIENT_ID: ${{ secrets.WEB_CLIENT_ID }}
          SPREAD_SHEET_ID: ${{ secrets.SPREAD_SHEET_ID }}
          ADMOB_APP_ID_DEBUG: ${{ secrets.ADMOB_APP_ID_DEBUG }}
          ADMOB_BANNER_AD_UNIT_ID_DEBUG: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID_DEBUG }}
          ADMOB_APP_ID_RELEASE: ${{ secrets.ADMOB_APP_ID_RELEASE }}
          ADMOB_BANNER_AD_UNIT_ID_RELEASE: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID_RELEASE }}
          MYAPP_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.MYAPP_RELEASE_KEYSTORE_PASSWORD }}
          MYAPP_RELEASE_KEY_ALIAS: ${{ secrets.MYAPP_RELEASE_KEY_ALIAS }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          RELEASE_KEYSTORE_FILE=./laundry_hub_key.jks
          RELEASE_KEY_PASSWORD="$MYAPP_RELEASE_KEYSTORE_PASSWORD"
          cat > config.properties <<EOF
          WEB_CLIENT_ID=$WEB_CLIENT_ID
          SPREAD_SHEET_ID=$SPREAD_SHEET_ID
          ADMOB_APP_ID_DEBUG=$ADMOB_APP_ID_DEBUG
          ADMOB_BANNER_AD_UNIT_ID_DEBUG=$ADMOB_BANNER_AD_UNIT_ID_DEBUG
          ADMOB_APP_ID_RELEASE=$ADMOB_APP_ID_RELEASE
          ADMOB_BANNER_AD_UNIT_ID_RELEASE=$ADMOB_BANNER_AD_UNIT_ID_RELEASE
          MYAPP_RELEASE_KEYSTORE_FILE=$RELEASE_KEYSTORE_FILE
          MYAPP_RELEASE_KEYSTORE_PASSWORD=$MYAPP_RELEASE_KEYSTORE_PASSWORD
          MYAPP_RELEASE_KEY_ALIAS=$MYAPP_RELEASE_KEY_ALIAS
          MYAPP_RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD
          SONAR_PROJECT_KEY=$SONAR_PROJECT_KEY
          SONAR_ORGANIZATION=$SONAR_ORGANIZATION
          SONAR_TOKEN=$SONAR_TOKEN
          EOF

      # Step 4: Upload environment files as artifact
      - name: Upload environment files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: env-files
          path: |
            ./app/google-services.json
            ./config.properties
            ./app/laundry_hub_key.jks

  firebase-distribution:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: setup-env

    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '18'

      - name: Download environment files
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: env-files
          path: .

      - name: Setup JDK
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3
        with:
          distribution: 'zulu'
          java-version: '18'

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Generate Release Notes from PR commits
        uses: actions/github-script@00f12e3e20659f42342b1c0226afda7f7c042325 # v6
        with:
          script: |
            let notes = '';
            if (context.payload.pull_request && context.payload.pull_request.number) {
              // PR event (ada number)
              const { data: commits } = await github.rest.pulls.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
              });
              notes = commits.map(c => `- ${c.commit.message.split('\n')[0]} (${c.commit.author.name})`).join('\n');
            } else if (context.payload.commits) {
              // Push event
              notes = context.payload.commits.map(c => `- ${c.message.split('\n')[0]} (${c.author.name})`).join('\n');
            } else {
              notes = 'No commits found';
            }
            require('fs').writeFileSync('release-notes.txt', notes);

      #      - name: Pull before push to avoid non-fast-forward error
      #        if: github.event.pull_request.base.ref != ''
      #        run: |
      #          git config --global user.email "github-actions@users.noreply.github.com"
      #          git config --global user.name "github-actions"
      #          git config pull.rebase false
      #          git pull origin ${{ github.event.pull_request.base.ref }} --allow-unrelated-histories
      #          git push origin HEAD:${{ github.event.pull_request.base.ref }}

      - name: Bump version
        run: |
          chmod +x scripts/bump_version.sh
          bash scripts/bump_version.sh


      - name: Commit bumped version
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add version.properties
          git commit -m "ci: bump version after Firebase upload"
          git push origin $(git rev-parse --abbrev-ref HEAD)

      - name: Distribute APK to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@bd494989dd4bec0343f78adee87fe66e48279ad6 # v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: internal-tester
          file: app/build/outputs/apk/release/app-release.apk
          releaseNotesFile: release-notes.txt

  github-release:
    if: github.event.pull_request.base.ref == 'development' # Berjalan hanya ketika PR ke development
    runs-on: ubuntu-latest
    needs: setup-env # Pastikan setup-env selesai sebelum job ini berjalan

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      # Step 2: Download environment files
      - name: Download environment files
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: env-files
          path: .

      # Step 3: Setup JDK
      - name: Setup JDK
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3
        with:
          distribution: 'zulu'
          java-version: '18'

      # Step 4: Grant execute permission for Gradlew
      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      # Step 5: Build APK (Release)
      - name: Build APK (Release)
        run: ./gradlew assembleRelease

      # Step 6: Install GitHub CLI
      - name: Install GitHub CLI
        run: sudo apt-get install gh

      # Step 7: Authenticate GitHub CLI
      - name: Authenticate GitHub CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s' "$GITHUB_TOKEN" | gh auth login --with-token

      # Step 8: Create GitHub Release
      - name: Create GitHub Release with CLI
        run: |
          gh release create ${{ github.ref_name }} \
          "app/build/outputs/apk/release/app-release.apk" \
          --title "Release for ${{ github.ref_name }}" \
          --notes "Automated release from GitHub Actions" \
          --prerelease

  code-coverage:
    runs-on: ubuntu-latest
    needs: setup-env

    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          fetch-depth: 0

      - name: Download environment files
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: env-files

      - name: Setup JDK
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3
        with:
          distribution: 'zulu'
          java-version: '18'

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Run tests and generate Jacoco report
        run: ./gradlew clean testDebugUnitTest jacocoTestReport

      - name: Check if coverage report exists
        run: ls -lh app/build/reports/jacoco/jacocoTestReport/

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          format: jacoco

      - name: Cache SonarQube packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew sonar \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.host.url=https://sonarcloud.io
